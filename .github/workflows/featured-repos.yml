name: Update featured repos
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build repo list and update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'bobo100';

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              per_page: 100,
              type: 'owner',
              sort: 'updated',
            });

            const visible = repos
              .filter(r => !r.fork && !r.archived && r.name.toLowerCase() !== username.toLowerCase())
              .sort((a, b) =>
                b.stargazers_count - a.stargazers_count ||
                new Date(b.pushed_at) - new Date(a.pushed_at)
              )
              .slice(0, 6);

            const langBadge = (lang) => lang
              ? ` \`${lang}\``
              : '';

            const lines = visible.map(r => {
              const stars = r.stargazers_count ? ` · ⭐ ${r.stargazers_count}` : '';
              const desc  = r.description ? ` — ${r.description}` : '';
              return `- 🔹 [**${r.name}**](${r.html_url})${langBadge(r.language)}${stars}${desc}`;
            });

            const md = lines.length
              ? lines.join('\n')
              : '_暫無公開 repo_';

            const readme = fs.readFileSync('README.md', 'utf8');
            const updated = readme.replace(
              /<!-- REPOS:START -->[\s\S]*?<!-- REPOS:END -->/,
              `<!-- REPOS:START -->\n${md}\n<!-- REPOS:END -->`
            );

            if (updated === readme) {
              core.info('README has no <!-- REPOS:START --> marker — skipping.');
              return;
            }
            fs.writeFileSync('README.md', updated);

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain README.md)" ]; then
            git add README.md
            git commit -m "chore(repos): refresh featured repo list"
            git push
          else
            echo "No changes."
          fi
