<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540">
  <defs>
    <linearGradient id="border-active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F72585"/>
      <stop offset="50%" stop-color="#7209B7"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
    <linearGradient id="border-cancel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94A1B2"/>
      <stop offset="100%" stop-color="#5A6178"/>
    </linearGradient>
    <linearGradient id="card-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4361EE" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <style>
    .title { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 19px; font-weight: 700; fill: #FFFFFE; }
    .desc  { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 13px; fill: #B8C1D1; }
    .icon  { font-size: 44px; }
    .badge { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .strike { text-decoration: line-through; fill: #94A1B2; }
  </style>

  <!-- Card 1: TypeScript-Tree Visualization -->
  <g transform="translate(20,20)">
    <rect width="420" height="160" rx="16" fill="#0F0E17"/>
    <rect width="420" height="160" rx="16" fill="url(#card-glow)"/>
    <rect width="420" height="160" rx="16" fill="none" stroke="url(#border-active)" stroke-width="2"/>
    <text x="30" y="78" class="icon">🌳</text>
    <text x="100" y="56" class="title">TypeScript-Tree</text>
    <text x="100" y="80" class="title">Visualization</text>
    <text x="100" y="106" class="desc">用 TypeScript 視覺化樹狀結構</text>
    <g transform="translate(100,122)">
      <rect width="78" height="22" rx="11" fill="#FFD60A"/>
      <text x="39" y="16" text-anchor="middle" class="badge" fill="#0F0E17">PLANNED</text>
    </g>
  </g>

  <!-- Card 2: Dice -->
  <g transform="translate(460,20)">
    <rect width="420" height="160" rx="16" fill="#0F0E17"/>
    <rect width="420" height="160" rx="16" fill="url(#card-glow)"/>
    <rect width="420" height="160" rx="16" fill="none" stroke="url(#border-active)" stroke-width="2"/>
    <text x="30" y="78" class="icon">🎲</text>
    <text x="100" y="68" class="title">Dice</text>
    <text x="100" y="100" class="desc">骰子模擬 / 機率練習</text>
    <g transform="translate(100,118)">
      <rect width="78" height="22" rx="11" fill="#FFD60A"/>
      <text x="39" y="16" text-anchor="middle" class="badge" fill="#0F0E17">PLANNED</text>
    </g>
  </g>

  <!-- Card 3: Black Desert Statistics -->
  <g transform="translate(20,200)">
    <rect width="420" height="160" rx="16" fill="#0F0E17"/>
    <rect width="420" height="160" rx="16" fill="url(#card-glow)"/>
    <rect width="420" height="160" rx="16" fill="none" stroke="url(#border-active)" stroke-width="2"/>
    <text x="30" y="78" class="icon">⚔️</text>
    <text x="100" y="56" class="title">Black Desert</text>
    <text x="100" y="80" class="title">Statistics</text>
    <text x="100" y="106" class="desc">更詳細、實用的黑色沙漠數據工具</text>
    <g transform="translate(100,122)">
      <rect width="78" height="22" rx="11" fill="#FFD60A"/>
      <text x="39" y="16" text-anchor="middle" class="badge" fill="#0F0E17">PLANNED</text>
    </g>
  </g>

  <!-- Card 4: Stock UI -->
  <g transform="translate(460,200)">
    <rect width="420" height="160" rx="16" fill="#0F0E17"/>
    <rect width="420" height="160" rx="16" fill="url(#card-glow)"/>
    <rect width="420" height="160" rx="16" fill="none" stroke="url(#border-active)" stroke-width="2"/>
    <text x="30" y="78" class="icon">📈</text>
    <text x="100" y="68" class="title">Stock UI</text>
    <text x="100" y="100" class="desc">股票相關介面練習</text>
    <g transform="translate(100,118)">
      <rect width="78" height="22" rx="11" fill="#FFD60A"/>
      <text x="39" y="16" text-anchor="middle" class="badge" fill="#0F0E17">PLANNED</text>
    </g>
  </g>

  <!-- Card 5: Cancelled - Tarot Prediction (full width) -->
  <g transform="translate(20,380)">
    <rect width="860" height="140" rx="16" fill="#0F0E17"/>
    <rect width="860" height="140" rx="16" fill="none" stroke="url(#border-cancel)" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="30" y="78" class="icon" opacity="0.55">🔮</text>
    <text x="100" y="62" class="title strike">Tarot Prediction</text>
    <text x="100" y="92" class="desc" font-style="italic">無法完成 — 卡片難蒐集</text>
    <g transform="translate(100,106)">
      <rect width="92" height="22" rx="11" fill="#DC3545"/>
      <text x="46" y="16" text-anchor="middle" class="badge" fill="#fff">CANCELLED</text>
    </g>
  </g>
</svg>
