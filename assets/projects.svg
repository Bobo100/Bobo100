<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540">
  <defs>
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F72585"/>
      <stop offset="50%" stop-color="#7209B7"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15101F"/>
      <stop offset="100%" stop-color="#0F0E1A"/>
    </linearGradient>
    <linearGradient id="inner-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1530"/>
      <stop offset="100%" stop-color="#15101F"/>
    </linearGradient>
    <linearGradient id="icon-bg-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7209B7" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="icon-bg-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4361EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4CC9F0" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="icon-bg-3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB5607" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD60A" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="icon-bg-4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7209B7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4361EE" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <style>
    .ptitle    { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 15px; font-weight: 700; fill: #FFFFFE; }
    .pdesc     { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 12px; fill: #B8C1D1; }
    .badge     { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; }
    .section   { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 16px; font-weight: 700; fill: #FFFFFE; }
    .label     { font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 11px; font-weight: 600; fill: #94A1B2; letter-spacing: 2px; }
    .strike    { fill: #6E7691; text-decoration: line-through; }
  </style>

  <rect width="880" height="540" rx="20" fill="url(#card-bg)"/>
  <rect width="880" height="540" rx="20" fill="none" stroke="url(#card-border)" stroke-width="2"/>

  <text x="32" y="40" class="label">PRACTICE  PROJECTS</text>
  <text x="32" y="64" class="section">🚀  準備進行的個人練習</text>
  <line x1="32" y1="82" x2="848" y2="82" stroke="#2A1F3D" stroke-width="1"/>

  <!-- Card 1: TypeScript-Tree Visualization -->
  <g transform="translate(32,108)">
    <rect width="404" height="130" rx="14" fill="url(#inner-card)" stroke="#2A1F3D" stroke-width="1"/>
    <rect x="20" y="25" width="64" height="64" rx="14" fill="url(#icon-bg-1)"/>
    <text x="52" y="74" text-anchor="middle" font-size="34">🌳</text>
    <text x="104" y="50" class="ptitle">TypeScript-Tree Vis.</text>
    <text x="104" y="74" class="pdesc">用 TypeScript 視覺化樹狀結構</text>
    <g transform="translate(104,90)">
      <rect width="72" height="20" rx="10" fill="#FFD60A"/>
      <text x="36" y="14" text-anchor="middle" class="badge" fill="#0F0E1A">PLANNED</text>
    </g>
  </g>

  <!-- Card 2: Dice -->
  <g transform="translate(444,108)">
    <rect width="404" height="130" rx="14" fill="url(#inner-card)" stroke="#2A1F3D" stroke-width="1"/>
    <rect x="20" y="25" width="64" height="64" rx="14" fill="url(#icon-bg-2)"/>
    <text x="52" y="74" text-anchor="middle" font-size="34">🎲</text>
    <text x="104" y="50" class="ptitle">Dice</text>
    <text x="104" y="74" class="pdesc">骰子模擬 / 機率練習</text>
    <g transform="translate(104,90)">
      <rect width="72" height="20" rx="10" fill="#FFD60A"/>
      <text x="36" y="14" text-anchor="middle" class="badge" fill="#0F0E1A">PLANNED</text>
    </g>
  </g>

  <!-- Card 3: Black Desert Statistics -->
  <g transform="translate(32,254)">
    <rect width="404" height="130" rx="14" fill="url(#inner-card)" stroke="#2A1F3D" stroke-width="1"/>
    <rect x="20" y="25" width="64" height="64" rx="14" fill="url(#icon-bg-3)"/>
    <text x="52" y="74" text-anchor="middle" font-size="34">⚔️</text>
    <text x="104" y="50" class="ptitle">Black Desert Stats</text>
    <text x="104" y="74" class="pdesc">更詳細實用的黑沙數據工具</text>
    <g transform="translate(104,90)">
      <rect width="72" height="20" rx="10" fill="#FFD60A"/>
      <text x="36" y="14" text-anchor="middle" class="badge" fill="#0F0E1A">PLANNED</text>
    </g>
  </g>

  <!-- Card 4: Stock UI -->
  <g transform="translate(444,254)">
    <rect width="404" height="130" rx="14" fill="url(#inner-card)" stroke="#2A1F3D" stroke-width="1"/>
    <rect x="20" y="25" width="64" height="64" rx="14" fill="url(#icon-bg-4)"/>
    <text x="52" y="74" text-anchor="middle" font-size="34">📈</text>
    <text x="104" y="50" class="ptitle">Stock UI</text>
    <text x="104" y="74" class="pdesc">股票相關介面練習</text>
    <g transform="translate(104,90)">
      <rect width="72" height="20" rx="10" fill="#FFD60A"/>
      <text x="36" y="14" text-anchor="middle" class="badge" fill="#0F0E1A">PLANNED</text>
    </g>
  </g>

  <!-- Card 5: Cancelled — Tarot Prediction -->
  <g transform="translate(32,400)">
    <rect width="816" height="110" rx="14" fill="#13101D" stroke="#3A2E4D" stroke-width="1" stroke-dasharray="6 4"/>
    <rect x="20" y="23" width="64" height="64" rx="14" fill="#2A1F3D" opacity="0.6"/>
    <text x="52" y="72" text-anchor="middle" font-size="32" opacity="0.55">🔮</text>
    <text x="104" y="48" class="ptitle strike">Tarot Prediction</text>
    <text x="104" y="72" class="pdesc" font-style="italic">無法完成 — 卡片難蒐集</text>
    <g transform="translate(104,86)">
      <rect width="86" height="20" rx="10" fill="#DC3545"/>
      <text x="43" y="14" text-anchor="middle" class="badge" fill="#fff">CANCELLED</text>
    </g>
  </g>
</svg>
