<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0B2E"/>
      <stop offset="40%" stop-color="#3A0CA3"/>
      <stop offset="100%" stop-color="#7209B7"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#F72585" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F72585" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#4CC9F0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4CC9F0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <linearGradient id="title-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="50%" stop-color="#F72585"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
    <linearGradient id="fade-bottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0A12" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow1)"/>
  <rect width="1200" height="320" fill="url(#glow2)"/>

  <g fill="white">
    <circle cx="120" cy="80" r="2.5" opacity="0.6"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="220" r="3" opacity="0.5"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="60" r="2" opacity="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="250" r="2.5" opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="120" r="2" opacity="0.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="70" r="2" opacity="0.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="270" r="2.5" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="200" r="1.8" opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="135" text-anchor="middle"
        font-family="'SF Mono', ui-monospace, Menlo, monospace"
        font-size="22" font-weight="600" fill="rgba(255,255,255,0.65)"
        style="letter-spacing:4px">
    H E L L O ,   W O R L D
  </text>

  <text x="600" y="200" text-anchor="middle"
        font-family="'SF Mono', ui-monospace, Menlo, monospace"
        font-size="64" font-weight="800" fill="url(#title-gradient)"
        style="letter-spacing:-2px">
    I'm Bobo 👋
  </text>

  <line x1="500" y1="225" x2="700" y2="225" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="600" y="258" text-anchor="middle"
        font-family="'SF Mono', ui-monospace, Menlo, monospace"
        font-size="17" font-weight="500" fill="rgba(255,255,255,0.85)">
    Frontend Developer · Lifelong Learner
  </text>

  <text x="600" y="285" text-anchor="middle"
        font-family="ui-monospace, monospace" font-size="13"
        fill="rgba(255,255,255,0.55)">
    ✨  凡人持續努力  ✨
  </text>

  <rect x="0" y="240" width="1200" height="80" fill="url(#fade-bottom)"/>
</svg>
