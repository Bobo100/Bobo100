<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="footer-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A0CA3">
        <animate attributeName="stop-color" values="#3A0CA3;#4361EE;#3A0CA3" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7209B7">
        <animate attributeName="stop-color" values="#7209B7;#B5179E;#7209B7" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F72585">
        <animate attributeName="stop-color" values="#F72585;#FB5607;#F72585" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="fade-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A12" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0A0A12" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="50%" stop-color="#F72585"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
  </defs>

  <path fill="url(#footer-bg)">
    <animate attributeName="d" dur="10s" repeatCount="indefinite"
             values="M0,65 C200,100 400,20 600,60 C800,95 1000,20 1200,55 L1200,180 L0,180 Z;
                     M0,65 C200,20 400,100 600,60 C800,20 1000,100 1200,55 L1200,180 L0,180 Z;
                     M0,65 C200,100 400,20 600,60 C800,95 1000,20 1200,55 L1200,180 L0,180 Z"/>
  </path>

  <rect x="0" y="0" width="1200" height="80" fill="url(#fade-top)"/>

  <g fill="white" opacity="0.7">
    <circle cx="200" cy="115" r="2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="135" r="2.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="115" r="2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="150" r="1.6"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="150" r="1.6"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="143" text-anchor="middle"
        font-family="'SF Mono', ui-monospace, Menlo, monospace"
        font-size="18" font-weight="700" fill="white"
        style="letter-spacing:2px">
    ✨  Thanks for visiting!  ✨
  </text>
</svg>
